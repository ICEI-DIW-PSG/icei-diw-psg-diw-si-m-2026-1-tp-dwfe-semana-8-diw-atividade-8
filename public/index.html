<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo</title>

    <style>

        body {
            font-family: Arial;
            background-color: #111;
            color: white;
            margin: 0;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #ffffff;
        }

        p {
            text-align: center;
        }

        #catalogo {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            width: 180px;
            background-color: #1e1e1e;
            border-radius: 10px;
            overflow: hidden;
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }

        .card h3 {
            padding: 10px;
            margin: 0;
        }

        #output {
            margin-top: 40px;
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
        }

    </style>
</head>
<body>

    <h1>Catálogo</h1>

    <p>Abra o Console (F12) para ver os resultados.</p>

    <div id="catalogo">

        <div class="card">
            <img src="https://m.media-amazon.com/images/I/91kFYg4fX3L.jpg">
            <h3>Interestelar</h3>
        </div>

        <div class="card">
            <img src="breakingbad.webp">
            <h3>Breaking Bad</h3>
        </div>

        <div class="card">
            <img src="avatar.webp">
            <h3>Avatar</h3>
        </div>

        <div class="card">
            <img src="stranger.webp">
            <h3>Stranger Things</h3>
        </div>

        <div class="card">
            <img src="o-poderoso-chefao.webp">
            <h3>O Poderoso Chefão</h3>
        </div>

        <div class="card">
            <img src="the office.webp">
            <h3>The Office</h3>
        </div>

    </div>

    <div id="output"></div>

    <script src="script.js"></script>

</body>
</html>
